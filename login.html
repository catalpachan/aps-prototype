<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREE AI-APS - 登录</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="1c5703c9-aca0-43d1-9843-9d502cb66fd0.png" alt="APS Logo" width="260" height="80">
                </div>
                <div class="login-subtitle">格力计划排程智能体 V3.5</div>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="form-input-group">
                        <i>👤</i>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username" spellcheck="false" aria-describedby="usernameError">
                    </div>
                    <div class="error-message" id="usernameError" role="status" aria-live="polite">用户名不能为空</div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="form-input-group">
                        <i>🔒</i>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password" aria-describedby="passwordError">
                    </div>
                    <div class="error-message" id="passwordError" role="status" aria-live="polite">密码不能为空</div>
                </div>
                
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                    <button type="button" class="forgot-password" onclick="forgotPassword()">忘记密码？</button>
                </div>
                <p class="login-hint" id="forgotPasswordHint" role="status" aria-live="polite"></p>
                
                <button type="submit" class="btn primary login-btn" id="loginBtn">
                    <span>登录</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>© 2025 珠海格力电器有限公司 Technology. 版权所有</p>
            </div>
        </div>
    </div>

    <script>
        // 表单验证
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            let isValid = true;
            
            // 重置错误信息
            document.getElementById('usernameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            document.getElementById('username').setAttribute('aria-invalid', 'false');
            document.getElementById('password').setAttribute('aria-invalid', 'false');
            
            // 验证用户名
            if (!username) {
                document.getElementById('usernameError').classList.add('show');
                document.getElementById('username').setAttribute('aria-invalid', 'true');
                isValid = false;
            }
            
            // 验证密码
            if (!password) {
                document.getElementById('passwordError').classList.add('show');
                document.getElementById('password').setAttribute('aria-invalid', 'true');
                isValid = false;
            }

            if (!isValid) {
                if (!username) {
                    document.getElementById('username').focus();
                } else if (!password) {
                    document.getElementById('password').focus();
                }
                return;
            }
            
            // 模拟登录过程
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerHTML = '<span>登录中...</span>';
            loginBtn.disabled = true;
            
            // 模拟API调用延迟
            setTimeout(() => {
                // 检查是否记住登录状态
                const rememberMe = document.getElementById('rememberMe').checked;
                
                if (rememberMe) {
                    localStorage.setItem('mimo_username', username);
                } else {
                    localStorage.removeItem('mimo_username');
                }
                
                // 存储登录状态
                sessionStorage.setItem('mimo_logged_in', 'true');
                sessionStorage.setItem('mimo_user', username);
                
                // 跳转到主页面
                window.location.href = 'index.html';
            }, 1500);
        });
        
        // 忘记密码
        function forgotPassword() {
            const hint = document.getElementById('forgotPasswordHint');
            if (!hint) return;
            hint.textContent = '请联系系统管理员重置密码：13888888888 / 180023@gree.com.cn';
            window.clearTimeout(window.__forgotHintTimer);
            window.__forgotHintTimer = window.setTimeout(() => {
                hint.textContent = '';
            }, 5000);
        }
        
        // 页面加载时检查是否有记住的用户名
        window.onload = function() {
            const savedUsername = localStorage.getItem('mimo_username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
        };
    </script>
</body>
</html>
