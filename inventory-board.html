<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>库存看板 - 格力高级计划排程系统</title>
  <link rel="stylesheet" href="common.css" />
  <style>
    .inventory-board-page { display: flex; flex-direction: column; gap: 14px; }
    .inventory-board-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .inventory-board-note { color: #94a3b8; font-size: 12px; }
    .inventory-overview-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }
    .inventory-overview-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(15, 27, 45, 0.94) 100%);
      padding: 12px;
      min-width: 0;
    }
    .inventory-overview-label { color: #94a3b8; font-size: 12px; margin-bottom: 8px; }
    .inventory-overview-value { color: #f8fafc; font-size: 24px; font-weight: 700; line-height: 1.1; }
    .inventory-overview-value .unit { font-size: 12px; color: #94a3b8; font-weight: 600; margin-left: 4px; }
    .inventory-overview-sub { margin-top: 6px; color: #64748b; font-size: 11px; }
    .inventory-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr);
      gap: 14px;
    }
    .inventory-warehouse-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .warehouse-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: #0f172a;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .warehouse-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .warehouse-card-title { color: #e2e8f0; font-size: 13px; font-weight: 700; }
    .warehouse-card-badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(56, 189, 248, 0.14);
      color: #7dd3fc;
    }
    .warehouse-card-badge.warn {
      background: rgba(251, 146, 60, 0.16);
      color: #fdba74;
    }
    .warehouse-bar {
      height: 9px;
      border-radius: 999px;
      background: #1e293b;
      overflow: hidden;
    }
    .warehouse-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
    }
    .warehouse-bar-fill.warn {
      background: linear-gradient(90deg, #fb923c, #f97316);
    }
    .warehouse-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .warehouse-metric {
      border: 1px solid rgba(51, 65, 85, 0.9);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.72);
      padding: 8px 10px;
    }
    .warehouse-metric-label { color: #64748b; font-size: 11px; margin-bottom: 4px; }
    .warehouse-metric-value { color: #f8fafc; font-size: 15px; font-weight: 700; }
    .warehouse-card-foot { color: #94a3b8; font-size: 11px; line-height: 1.5; }
    .inventory-side-stack { display: grid; gap: 10px; }
    .inventory-side-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(15, 27, 45, 0.94) 100%);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .inventory-side-title { color: #e2e8f0; font-size: 13px; font-weight: 700; }
    .inventory-side-list { display: grid; gap: 8px; }
    .inventory-side-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(51, 65, 85, 0.9);
      color: #cbd5e1;
      font-size: 12px;
    }
    .inventory-side-item strong { color: #f8fafc; font-size: 13px; }
    .inventory-side-item.warn strong { color: #fdba74; }
    .inventory-side-item.ok strong { color: #7dd3fc; }
    .inventory-side-caption { color: #64748b; font-size: 11px; line-height: 1.55; }
    @media (max-width: 1320px) {
      .inventory-overview-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .inventory-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 960px) {
      .inventory-overview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .inventory-warehouse-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="aps-header-layout">
    <div class="brand-block">
      <img class="header-logo" src="1c5703c9-aca0-43d1-9843-9d502cb66fd0.png" alt="APS Logo" width="143" height="44" />
      <div class="aps-console-title">
        <div class="aps-console-title-main">格力高级计划排程系统</div>
        <div class="aps-console-title-sub">跨厂协同排程控制台</div>
      </div>
    </div>
    <nav class="nav aps-main-nav" id="nav">
      <a href="decision.html" class="nav-item active">决策分析</a>
      <a href="collab.html" class="nav-item">排产操作</a>
      <a href="settings.html" class="nav-item">系统设置</a>
    </nav>
    <div class="header-meta aps-header-meta" id="header-meta">
      <div class="aps-site-switch">
        <span class="aps-site-switch-label">制造基地</span>
        <select id="hq-select" class="role-select" aria-label="基地切换">
          <option>珠海格力总部</option>
          <option>金湾基地</option>
          <option>武汉基地</option>
          <option>洛阳基地</option>
        </select>
      </div>
      <span id="header-date" class="aps-clock-chip">2026-03-18 10:08:00</span>
      <button type="button" class="aps-notify-btn" id="aps-notify-btn" aria-label="打开消息通知">
        🔔<span class="aps-notify-badge" id="aps-notify-badge">0</span>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <div class="user-dropdown-toggle" onclick="toggleUserDropdown()">
          <div class="avatar">张</div>
          <span class="name">张伟</span>
          <span class="arrow">▼</span>
        </div>
        <div class="user-dropdown-menu">
          <a href="settings.html?sub=profile" class="user-dropdown-item">👤 用户信息</a>
          <a href="login.html" class="user-dropdown-item logout">🚪 退出</a>
        </div>
      </div>
    </div>
  </header>

  <main id="app">
    <section class="view inventory-board-page">
      <article class="card">
        <div class="card-hd">
          <span>库存看板</span>
          <div class="inventory-board-toolbar">
            <span class="inventory-board-note">聚合展示库存总数、容量、出入库与成品仓占用情况</span>
            <a href="decision.html" class="btn sm">返回决策分析</a>
          </div>
        </div>
        <div class="card-bd">
          <div class="inventory-overview-grid" id="inventory-overview-grid"></div>
        </div>
      </article>

      <div class="inventory-layout">
        <article class="card">
          <div class="card-hd">
            <span>成品仓占用明细</span>
            <span class="muted">成品仓1 - 成品仓9</span>
          </div>
          <div class="card-bd">
            <div class="inventory-warehouse-grid" id="inventory-warehouse-grid"></div>
          </div>
        </article>

        <div class="inventory-side-stack">
          <article class="inventory-side-card">
            <div class="inventory-side-title">重点关注</div>
            <div class="inventory-side-list" id="inventory-focus-list"></div>
          </article>
          <article class="inventory-side-card">
            <div class="inventory-side-title">库存观察</div>
            <div class="inventory-side-caption" id="inventory-side-caption"></div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script>
    const warehouseData = [
      { name: '成品仓1', capacity: 2400, stock: 1980, turnover: 5.8 },
      { name: '成品仓2', capacity: 2600, stock: 2140, turnover: 5.6 },
      { name: '成品仓3', capacity: 2500, stock: 1725, turnover: 4.9 },
      { name: '成品仓4', capacity: 2300, stock: 1450, turnover: 4.3 },
      { name: '成品仓5', capacity: 2700, stock: 2385, turnover: 6.2 },
      { name: '成品仓6', capacity: 2450, stock: 1890, turnover: 5.1 },
      { name: '成品仓7', capacity: 2550, stock: 2015, turnover: 5.4 },
      { name: '成品仓8', capacity: 2350, stock: 1580, turnover: 4.7 },
      { name: '成品仓9', capacity: 2650, stock: 2260, turnover: 6.0 }
    ];

    const todayShipment = 1286;
    const todayInbound = 1042;
    const deadStock = 168;
    const weeklyChange = 6.4;

    function formatNumber(value) {
      return new Intl.NumberFormat('zh-CN').format(value);
    }

    function renderInventoryOverview() {
      const totalCapacity = warehouseData.reduce((sum, item) => sum + item.capacity, 0);
      const totalStock = warehouseData.reduce((sum, item) => sum + item.stock, 0);
      const avgTurnover = warehouseData.reduce((sum, item) => sum + item.turnover, 0) / warehouseData.length;
      const overview = [
        { label: '库存总数', value: formatNumber(totalStock), unit: '台', sub: `当前总占用 ${((totalStock / totalCapacity) * 100).toFixed(1)}%` },
        { label: '库存总容量', value: formatNumber(totalCapacity), unit: '台', sub: '成品仓1-9合计容量' },
        { label: '库存周转率', value: avgTurnover.toFixed(1), unit: '次/月', sub: `较上周 ${weeklyChange > 0 ? '+' : ''}${weeklyChange}%` },
        { label: '今日发货量', value: formatNumber(todayShipment), unit: '台', sub: '已出库发运完成量' },
        { label: '今日入库量', value: formatNumber(todayInbound), unit: '台', sub: '今日成品入库累计' },
        { label: '呆料', value: formatNumber(deadStock), unit: '台', sub: '超过 30 天未周转' }
      ];

      const grid = document.getElementById('inventory-overview-grid');
      if (!grid) return;
      grid.innerHTML = overview.map((item) => `
        <div class="inventory-overview-card">
          <div class="inventory-overview-label">${item.label}</div>
          <div class="inventory-overview-value">${item.value}<span class="unit">${item.unit}</span></div>
          <div class="inventory-overview-sub">${item.sub}</div>
        </div>
      `).join('');
    }

    function renderWarehouseGrid() {
      const grid = document.getElementById('inventory-warehouse-grid');
      if (!grid) return;
      grid.innerHTML = warehouseData.map((item) => {
        const occupancy = (item.stock / item.capacity) * 100;
        const warn = occupancy >= 88;
        return `
          <div class="warehouse-card">
            <div class="warehouse-card-head">
              <div class="warehouse-card-title">${item.name}</div>
              <span class="warehouse-card-badge ${warn ? 'warn' : ''}">${occupancy.toFixed(1)}%</span>
            </div>
            <div class="warehouse-bar">
              <div class="warehouse-bar-fill ${warn ? 'warn' : ''}" style="width:${occupancy.toFixed(1)}%"></div>
            </div>
            <div class="warehouse-metrics">
              <div class="warehouse-metric">
                <div class="warehouse-metric-label">库存</div>
                <div class="warehouse-metric-value">${formatNumber(item.stock)} 台</div>
              </div>
              <div class="warehouse-metric">
                <div class="warehouse-metric-label">库存周转率</div>
                <div class="warehouse-metric-value">${item.turnover.toFixed(1)} 次/月</div>
              </div>
            </div>
            <div class="warehouse-card-foot">当前容量 ${formatNumber(item.capacity)} 台，剩余 ${formatNumber(item.capacity - item.stock)} 台可用空间。</div>
          </div>
        `;
      }).join('');
    }

    function renderFocusPanel() {
      const focusList = document.getElementById('inventory-focus-list');
      const caption = document.getElementById('inventory-side-caption');
      if (!focusList || !caption) return;

      const sorted = [...warehouseData].sort((a, b) => (b.stock / b.capacity) - (a.stock / a.capacity));
      focusList.innerHTML = `
        <div class="inventory-side-item warn">
          <span>高占用仓位</span>
          <strong>${sorted[0].name} ${(sorted[0].stock / sorted[0].capacity * 100).toFixed(1)}%</strong>
        </div>
        <div class="inventory-side-item ok">
          <span>最高周转仓位</span>
          <strong>${[...warehouseData].sort((a, b) => b.turnover - a.turnover)[0].name} ${Math.max(...warehouseData.map((item) => item.turnover)).toFixed(1)} 次/月</strong>
        </div>
        <div class="inventory-side-item">
          <span>今日出入库差额</span>
          <strong>${formatNumber(todayShipment - todayInbound)} 台</strong>
        </div>
        <div class="inventory-side-item">
          <span>呆料占比</span>
          <strong>${((deadStock / warehouseData.reduce((sum, item) => sum + item.stock, 0)) * 100).toFixed(1)}%</strong>
        </div>
      `;

      caption.textContent = '当前库存看板显示，成品仓5与成品仓9接近高占用区间，建议优先安排发货节奏较慢的批次外移；成品仓4与成品仓8仍有较大缓冲空间，可作为临时调拨承接仓。';
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderInventoryOverview();
      renderWarehouseGrid();
      renderFocusPanel();
    });
  </script>
  <script src="common.js"></script>
</body>
</html>
