<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>格力高级计划排程系统</title>
  <link rel="stylesheet" href="common.css" />
  <style>
    .collab-layout { display: grid; grid-template-columns: 420px 1fr; gap: 14px; min-height: 660px; }
    .collab-left { display: flex; flex-direction: column; gap: 14px; }
    .wip-orders-card { border: 1px solid #334155; border-radius: 10px; background: linear-gradient(160deg, #101b2f 0%, #0f172a 100%); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .wip-orders-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .wip-orders-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #e2e8f0; }
    .wip-plant-chip { font-size: 11px; color: #dbeafe; background: rgba(37, 99, 235, 0.25); border: 1px solid rgba(59, 130, 246, 0.55); border-radius: 999px; padding: 3px 8px; }
    .wip-plant-select { min-width: 120px; height: 30px; border: 1px solid #334155; border-radius: 8px; background: #111b2d; color: #e2e8f0; font-size: 12px; padding: 0 8px; }
    .wip-plant-select:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.18); }
    .wip-orders-sub { font-size: 11px; color: #94a3b8; }
    .wip-orders-list { max-height: 384px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .wip-orders-list { -ms-overflow-style: none; scrollbar-width: none; }
    .wip-orders-list::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .wip-order-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #2e3d56; border-radius: 8px; padding: 9px 10px; background: #111b2d; cursor: pointer; transition: border-color var(--dur-fast), transform var(--dur-fast), box-shadow var(--dur-fast); }
    .wip-order-item:hover { border-color: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 16px rgba(15, 23, 42, 0.45); }
    .wip-order-main { min-width: 0; flex: 1; }
    .wip-order-no { font-size: 12px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
    .wip-order-meta { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wip-order-right { text-align: right; white-space: nowrap; }
    .wip-order-qty { font-size: 12px; font-weight: 700; color: #38bdf8; }
    .wip-order-time { font-size: 10px; color: #64748b; margin-top: 2px; }
    .wip-pagination { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .wip-page-btn { min-width: 66px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #cbd5e1; font-size: 11px; padding: 5px 10px; cursor: pointer; transition: all var(--dur-fast); }
    .wip-page-btn:hover:not(:disabled) { border-color: #2563eb; background: #2563eb; color: #fff; }
    .wip-page-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .wip-page-info { font-size: 11px; color: #94a3b8; font-weight: 700; }
    .collab-result-empty { border: 1px dashed #3b4c67; border-radius: 10px; background: linear-gradient(160deg, #0f1a2d 0%, #0f172a 100%); padding: 12px; color: #94a3b8; display: flex; flex-direction: column; gap: 6px; line-height: 1.6; }
    .collab-result-empty b { color: #cbd5e1; font-size: 13px; font-weight: 700; }
    .collab-result { border: 1px solid #334155; border-radius: 10px; background: linear-gradient(160deg, #10192b 0%, #0f172a 100%); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .collab-metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .collab-metric-item { border: 1px solid #2f3d55; border-radius: 8px; padding: 8px; background: #111c2f; }
    .collab-metric-bar { height: 6px; border-radius: 999px; background: #223147; overflow: hidden; margin-top: 6px; }
    .collab-metric-fill { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%); }
    .collab-right { min-width: 0; height: 770px; position: sticky; top: 76px; align-self: start; display: flex; flex-direction: column; }
    .collab-right .card-bd { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .gantt-wrap { border: 1px solid #334155; border-radius: 8px; overflow: auto; max-height: 620px; background: #0d1525; }
    .gantt-wrap { -ms-overflow-style: none; scrollbar-width: none; }
    .gantt-wrap::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .collab-right .gantt-wrap { flex: 1; max-height: none; }
    .gantt-table { border-collapse: collapse; width: max-content; min-width: 100%; table-layout: fixed; --gantt-cell-w: 56px; }
    .gantt-table th, .gantt-table td { border: 1px solid #2b3548; padding: 0; text-align: center; height: 30px; white-space: nowrap; overflow: visible; position: relative; }
    .gantt-table th { background: #172033; color: #c9d5e9; font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 4; padding: 4px 2px; height: 32px; }
    .gantt-line-col { min-width: 92px; width: 92px; background: #101a2d; color: #a6b7d8; font-weight: 600; padding: 0 6px !important; }
    .gantt-task { position: absolute; left: 1px; top: 3px; height: 22px; border-radius: 6px; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; padding: 0 8px; cursor: grab; z-index: 5; border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35); user-select: none; touch-action: none; }
    .gantt-task:hover { transform: translateY(-1px); box-shadow: 0 8px 14px rgba(0,0,0,0.3); filter: brightness(1.05); }
    .gantt-task:active { cursor: grabbing; }
    .gantt-task-label { pointer-events: none; padding: 0 8px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .gantt-resize-handle { position: absolute; top: 0; width: 8px; height: 100%; z-index: 6; }
    .gantt-resize-handle.left { left: 0; cursor: ew-resize; }
    .gantt-resize-handle.right { right: 0; cursor: ew-resize; }
    .gantt-resize-handle:hover { background: rgba(255,255,255,0.18); }
    .gantt-task.a { background: linear-gradient(90deg, #2563eb, #1d4ed8); }
    .gantt-task.b { background: linear-gradient(90deg, #0f766e, #0d9488); }
    .gantt-task.c { background: linear-gradient(90deg, #b45309, #d97706); }
    .gantt-task.d { background: linear-gradient(90deg, #7c3aed, #9333ea); }
    .task-editor-status { border: 1px solid #334155; border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.45; background: #111b2d; color: #cbd5e1; }
    .task-editor-status.ok { border-color: #1f6a48; background: rgba(34, 197, 94, 0.12); color: #bbf7d0; }
    .task-editor-status.error { border-color: #7f1d1d; background: rgba(239, 68, 68, 0.12); color: #fecaca; }
    .task-editor-preview { font-size: 12px; color: #93c5fd; margin-top: 2px; }
    .lock-strip { display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1px solid #334155; border-radius: 8px; padding: 8px; background: #111a2a; margin-bottom: 8px; font-size: 12px; }
    .preplan-btn { border: 1px solid #3b82f6; border-radius: 8px; padding: 6px 10px; color: #dbeafe; font-weight: 700; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #38bdf8 100%); cursor: pointer; font-size: 12px; }
    .execute-btn { border: 1px solid #22c55e; border-radius: 8px; padding: 6px 10px; color: #dcfce7; font-weight: 700; background: linear-gradient(135deg, #166534 0%, #16a34a 55%, #4ade80 100%); cursor: pointer; font-size: 12px; }
    @media (max-width: 960px) { .collab-layout { grid-template-columns: 1fr; } .collab-right { position: static; height: auto; } }
  </style>
</head>
<body>
  <header>
    <div class="brand-block">
      <img class="header-logo" src="1c5703c9-aca0-43d1-9843-9d502cb66fd0.png" alt="APS Logo" width="143" height="44" />
      <div class="aps-console-title">
        <div class="aps-console-title-main">格力高级计划排程系统</div>
        <div class="aps-console-title-sub">跨厂协同排程控制台</div>
      </div>
      <div class="aps-site-switch">
        <span class="aps-site-switch-label">制造基地</span>
        <select id="hq-select" class="role-select" aria-label="基地切换">
          <option>珠海格力总部</option>

    <nav class="nav aps-main-nav" id="nav">
      <a href="collab.html" class="nav-item active">排产操作</a>
      <a href="decision.html" class="nav-item">决策分析</a>
      <a href="settings.html" class="nav-item">系统设置</a>

      <span id="header-date" class="aps-clock-chip">2026-02-28 08:56:33</span>
      <button type="button" class="aps-notify-btn" id="aps-notify-btn" aria-label="打开消息通知">
        🔔<span class="aps-notify-badge" id="aps-notify-badge">0</span>

      <div class="user-dropdown" id="user-dropdown">

  <main id="app">
    <section class="view" id="view-collab">
      <div class="collab-layout">
        <div class="collab-left">
          <article class="wip-orders-card">
            <div class="wip-orders-head">
              <div class="wip-orders-title">
                <span>各分厂在制订单</span>
                <span class="wip-plant-chip" id="wip-current-plant">东区总装</span>
              </div>
              <select class="wip-plant-select" id="wip-plant-select" aria-label="切换分厂" onchange="onWipPlantChange(this.value)">

                <option value="west">西区总装</option>
                <option value="inject">注塑分厂</option>

                <option value="ctrl">控制器分厂</option>
              </select>
            </div>

            <div class="wip-orders-list" id="wip-orders-list"></div>
            <div class="wip-pagination">
              <button class="wip-page-btn" id="wip-prev-page" onclick="changeWipPage(-1)">上一页</button>
              <span class="wip-page-info" id="wip-page-info">1 / 1</span>
              <button class="wip-page-btn" id="wip-next-page" onclick="changeWipPage(1)">下一页</button>

          </article>
        </div>

        <article class="card collab-right">

            <span>可视化交互工作台</span>
            <div class="row">
              <select id="gantt-plant-filter" aria-label="分厂筛选"><option value="all">全部分厂</option><option value="east">东区总装</option><option value="west">西区总装</option><option value="inject">注塑分厂</option><option value="hx">两器分厂</option><option value="ctrl">控制器分厂</option></select>

  <div class="modal-mask" id="task-editor-mask" aria-hidden="true">

      </div>

          <div><div class="muted">任务名称</div><div id="task-edit-name" style="font-weight:700;color:#e2e8f0;"></div></div>
          <div><div class="muted">所在产线</div><div id="task-edit-line" style="font-weight:700;color:#e2e8f0;"></div></div>

          </div>

          </div>

      </div>

        <button type="button" class="btn" id="task-edit-cancel">取消</button>

  </div>

  <div class="modal-mask" id="execute-confirm-mask" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="execute-confirm-title">
      <div class="modal-hd">
        <span id="execute-confirm-title">执行方案确认</span>
        <button type="button" class="btn sm" id="execute-confirm-close">关闭</button>
      </div>
      <div class="modal-bd single-col">
        <div class="task-editor-status">
          <div style="font-weight:700;color:#e2e8f0;margin-bottom:6px;">确认执行当前预排方案？</div>
          <div class="muted">执行后将覆盖当前甘特排产结果，请确认后继续。</div>
        </div>
      </div>
      <div class="modal-ft">
        <button type="button" class="btn" id="execute-confirm-cancel">取消</button>

      </div>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="common.js"></script>
  <script>
    function renderLocks() {
      const locks = state.locks || [];
      document.getElementById('collab-locks').innerHTML = `
        <span>锁定状态: ${locks.length}条产线已锁定</span>
        <span class="muted">最后更新: ${formatClockTime()}</span>
      `;
    }

    const GANTT_CELL_W = 56;
    const GANTT_TOTAL_COLS = 25;
    const GANTT_LINE_TOTAL = 20;
    const GANTT_ROW_H = 30;
    let ganttPointerCtx = null;
    let ganttRafPending = false;
    const taskEditorState = { taskIndex: -1, lastFocusedEl: null };
    const WIP_PAGE_SIZE = 10;
    const wipPlants = [
      { key: 'east', name: '东区总装' },
      { key: 'west', name: '西区总装' },
      { key: 'inject', name: '注塑分厂' },
      { key: 'hx', name: '两器分厂' },
      { key: 'ctrl', name: '控制器分厂' }
    ];
    let currentWipPlantIndex = 0;
    let currentWipPage = 1;

    function createWipOrderData(plantIndex) {
      const models = ['KFR-35GW', 'KFR-50GW', 'KFR-72GW', 'KFR-120LW', 'GMV-160WL'];
      const steps = ['总装', '注塑成型', '两器焊接', '控制板装配', '整机测试'];
      return Array.from({ length: 24 }, (_, idx) => {
        const seq = plantIndex * 100 + 201 + idx;
        return {
          orderNo: `SO-20260311-${String(seq).padStart(3, '0')}`,
          model: models[(plantIndex + idx) % models.length],
          step: steps[(plantIndex * 2 + idx) % steps.length],
          qty: 60 + ((plantIndex * 37 + idx * 29) % 260),
          progress: 12 + ((plantIndex * 15 + idx * 9) % 81),
          updated: `${2 + (idx % 10)}分钟前`
        };
      });
    }

    const wipOrdersByPlant = wipPlants.reduce((acc, plant, idx) => {
      acc[plant.key] = createWipOrderData(idx);
      return acc;
    }, {});

    function renderWipOrders() {
      const plant = wipPlants[currentWipPlantIndex];
      const all = wipOrdersByPlant[plant.key] || [];
      const totalPages = Math.max(1, Math.ceil(all.length / WIP_PAGE_SIZE));
      currentWipPage = clamp(currentWipPage, 1, totalPages);

      const listEl = document.getElementById('wip-orders-list');
      if (!listEl) return;

      const start = (currentWipPage - 1) * WIP_PAGE_SIZE;
      const items = all.slice(start, start + WIP_PAGE_SIZE);

      const plantEl = document.getElementById('wip-current-plant');
      const subEl = document.getElementById('wip-orders-sub');
      const plantSelectEl = document.getElementById('wip-plant-select');
      const pageEl = document.getElementById('wip-page-info');
      const prevEl = document.getElementById('wip-prev-page');
      const nextEl = document.getElementById('wip-next-page');

      if (plantEl) plantEl.textContent = plant.name;
      if (subEl) subEl.textContent = `${plant.name}近${WIP_PAGE_SIZE}条在制订单`;
      if (plantSelectEl && plantSelectEl.value !== plant.key) plantSelectEl.value = plant.key;

      listEl.innerHTML = items.map(item => `
        <div class="wip-order-item" onclick="openWipOrder('${item.orderNo}', '${plant.name}', '${item.model}', '${item.step}', ${item.qty}, ${item.progress})">
          <div class="wip-order-main">
            <div class="wip-order-no">${item.orderNo}</div>
            <div class="wip-order-meta">${item.model} · ${item.step} · 完成度 ${item.progress}%</div>
          </div>
          <div class="wip-order-right">
            <div class="wip-order-qty">${item.qty}套</div>
            <div class="wip-order-time">${item.updated}</div>
          </div>
        </div>
      `).join('');

      if (pageEl) pageEl.textContent = `${currentWipPage} / ${totalPages}`;
      if (prevEl) prevEl.disabled = currentWipPage <= 1;
      if (nextEl) nextEl.disabled = currentWipPage >= totalPages;
    }

    function onWipPlantChange(plantKey) {
      const nextIndex = wipPlants.findIndex((p) => p.key === plantKey);
      if (nextIndex < 0) return;
      currentWipPlantIndex = nextIndex;
      currentWipPage = 1;
      renderWipOrders();
      toast(`已切换至 ${wipPlants[nextIndex].name}`);
    }

    function changeWipPage(offset) {
      const plant = wipPlants[currentWipPlantIndex];
      const totalPages = Math.max(1, Math.ceil((wipOrdersByPlant[plant.key] || []).length / WIP_PAGE_SIZE));
      const nextPage = currentWipPage + offset;
      if (nextPage < 1 || nextPage > totalPages) return;
      currentWipPage = nextPage;
      renderWipOrders();
    }

    function openWipOrder(orderNo, plantName, model, step, qty, progress) {
      toast(`${plantName} | ${orderNo} | ${model} | ${step} | ${qty}套 | 完成度${progress}%`);
    }

    function clamp(val, min, max) {
      return Math.min(max, Math.max(min, val));
    }

    function sanitizeTask(task) {
      task.start = clamp(Math.round(task.start || 0), 0, GANTT_TOTAL_COLS - 1);
      task.duration = clamp(Math.round(task.duration || 1), 1, GANTT_TOTAL_COLS);
      task.line = clamp(Math.round(task.line || 0), 0, GANTT_LINE_TOTAL - 1);
      if (task.start + task.duration > GANTT_TOTAL_COLS) {
        task.start = GANTT_TOTAL_COLS - task.duration;
      }
    }

    function lineMatchesFilter(line, filter) {
      if (!filter || filter === 'all') return true;
      if (filter === 'east') return line >= 0 && line <= 3;
      if (filter === 'west') return line >= 4 && line <= 7;
      if (filter === 'inject') return line >= 8 && line <= 11;
      if (filter === 'hx') return line >= 12 && line <= 15;
      if (filter === 'ctrl') return line >= 16 && line <= 19;
      return true;
    }

    function scheduleGanttRerender() {
      if (ganttRafPending) return;
      ganttRafPending = true;
      requestAnimationFrame(() => {
        ganttRafPending = false;
        renderGanttWorkbench();
      });
    }

    function toHourLabel(hour) {
      return `${String(hour).padStart(2, '0')}:00`;
    }

    function getTaskEditorElements() {
      return {
        mask: document.getElementById('task-editor-mask'),
        name: document.getElementById('task-edit-name'),
        line: document.getElementById('task-edit-line'),
        start: document.getElementById('task-edit-start'),
        end: document.getElementById('task-edit-end'),
        preview: document.getElementById('task-edit-preview'),
        status: document.getElementById('task-edit-status'),
        save: document.getElementById('task-edit-save')
      };
    }

    function buildTaskEditorOptions() {
      const { start, end } = getTaskEditorElements();
      if (!start || !end) return;
      if (!start.options.length) {
        let startHtml = '';
        for (let h = 0; h <= 24; h++) {
          startHtml += `<option value="${h}">${toHourLabel(h)}</option>`;
        }
        start.innerHTML = startHtml;
      }
      if (!end.options.length) {
        let endHtml = '';
        for (let h = 1; h <= 25; h++) {
          endHtml += `<option value="${h}">${toHourLabel(h)}</option>`;
        }
        end.innerHTML = endHtml;
      }
    }

    function findTaskConflict(taskIndex, line, start, end) {
      const tasks = state.ganttTasks || [];
      return tasks.find((task, idx) => {
        if (idx === taskIndex || task.line !== line) return false;
        sanitizeTask(task);
        const otherStart = task.start;
        const otherEnd = task.start + task.duration;
        return start < otherEnd && otherStart < end;
      });
    }

    function validateTaskEditor() {
      const { start, end, preview, status, save } = getTaskEditorElements();
      const task = state.ganttTasks?.[taskEditorState.taskIndex];
      if (!task || !start || !end || !status || !save || !preview) {
        return false;
      }

      const startHour = Number(start.value);
      const endHour = Number(end.value);
      preview.textContent = `预览：${toHourLabel(startHour)} - ${toHourLabel(endHour)}`;
      status.className = 'task-editor-status';

      if (!Number.isInteger(startHour) || !Number.isInteger(endHour) || endHour <= startHour) {
        status.textContent = '时间无效：结束时间必须晚于开始时间。';
        status.classList.add('error');
        save.disabled = true;
        return false;
      }
      if (startHour < 0 || endHour > GANTT_TOTAL_COLS) {
        status.textContent = '时间范围无效：需满足 00:00 到 25:00。';
        status.classList.add('error');
        save.disabled = true;
        return false;
      }

      const conflict = findTaskConflict(taskEditorState.taskIndex, task.line, startHour, endHour);
      if (conflict) {
        status.textContent = `冲突：与 ${conflict.name}（${toHourLabel(conflict.start)}-${toHourLabel(conflict.start + conflict.duration)}）重叠。`;
        status.classList.add('error');
        save.disabled = true;
        return false;
      }

      status.textContent = '校验通过：时间段可用，可保存。';
      status.classList.add('ok');
      save.disabled = false;
      return true;
    }

    function openTaskEditor(taskIndex) {
      const task = state.ganttTasks?.[taskIndex];
      if (!task) return;
      sanitizeTask(task);
      buildTaskEditorOptions();

      const els = getTaskEditorElements();
      taskEditorState.taskIndex = taskIndex;
      taskEditorState.lastFocusedEl = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      if (els.name) els.name.textContent = task.name;
      if (els.line) els.line.textContent = `ZZW${String(task.line + 1).padStart(2, '0')}`;
      if (els.start) els.start.value = String(task.start);
      if (els.end) els.end.value = String(task.start + task.duration);
      validateTaskEditor();

      if (els.mask) {
        els.mask.classList.add('show');
        els.mask.setAttribute('aria-hidden', 'false');
      }
      setTimeout(() => els.start?.focus(), 0);
    }

    function closeTaskEditor() {
      const { mask } = getTaskEditorElements();
      if (mask) {
        mask.classList.remove('show');
        mask.setAttribute('aria-hidden', 'true');
      }
      if (taskEditorState.lastFocusedEl) {
        taskEditorState.lastFocusedEl.focus();
      }
      taskEditorState.lastFocusedEl = null;
      taskEditorState.taskIndex = -1;
    }

    function saveTaskEditor() {
      const task = state.ganttTasks?.[taskEditorState.taskIndex];
      const { start, end } = getTaskEditorElements();
      if (!task || !start || !end) return;
      if (!validateTaskEditor()) return;

      task.start = Number(start.value);
      task.duration = Number(end.value) - Number(start.value);
      sanitizeTask(task);
      renderGanttWorkbench();
      closeTaskEditor();
      toast(`任务时间已修改：${task.name}（${toHourLabel(task.start)}-${toHourLabel(task.start + task.duration)}）`);
    }

    function startTaskPointerInteraction(e, taskIndex) {
      const task = state.ganttTasks?.[taskIndex];
      if (!task) return;
      sanitizeTask(task);

      const resizeHandle = e.target.closest('.gantt-resize-handle');
      const mode = resizeHandle?.dataset.resize || 'move';
      ganttPointerCtx = {
        pointerId: e.pointerId,
        mode,
        taskIndex,
        startX: e.clientX,
        startY: e.clientY,
        baseStart: task.start,
        baseDuration: task.duration,
        baseLine: task.line,
        changed: false
      };
      e.preventDefault();
    }

    function onTaskPointerMove(e) {
      if (!ganttPointerCtx || e.pointerId !== ganttPointerCtx.pointerId) return;
      const task = state.ganttTasks?.[ganttPointerCtx.taskIndex];
      if (!task) return;

      const dxCols = Math.round((e.clientX - ganttPointerCtx.startX) / GANTT_CELL_W);
      const dyRows = Math.round((e.clientY - ganttPointerCtx.startY) / GANTT_ROW_H);

      if (ganttPointerCtx.mode === 'move') {
        task.start = clamp(ganttPointerCtx.baseStart + dxCols, 0, GANTT_TOTAL_COLS - ganttPointerCtx.baseDuration);
        task.duration = ganttPointerCtx.baseDuration;
        task.line = clamp(ganttPointerCtx.baseLine + dyRows, 0, GANTT_LINE_TOTAL - 1);
      } else if (ganttPointerCtx.mode === 'left') {
        const fixedEnd = ganttPointerCtx.baseStart + ganttPointerCtx.baseDuration;
        const newStart = clamp(ganttPointerCtx.baseStart + dxCols, 0, fixedEnd - 1);
        task.start = newStart;
        task.duration = fixedEnd - newStart;
      } else if (ganttPointerCtx.mode === 'right') {
        const newEnd = clamp(ganttPointerCtx.baseStart + ganttPointerCtx.baseDuration + dxCols, ganttPointerCtx.baseStart + 1, GANTT_TOTAL_COLS);
        task.start = ganttPointerCtx.baseStart;
        task.duration = newEnd - ganttPointerCtx.baseStart;
      }

      sanitizeTask(task);
      ganttPointerCtx.changed = ganttPointerCtx.changed
        || task.start !== ganttPointerCtx.baseStart
        || task.duration !== ganttPointerCtx.baseDuration
        || task.line !== ganttPointerCtx.baseLine;
      scheduleGanttRerender();
    }

    function onTaskPointerUp(e) {
      if (!ganttPointerCtx || e.pointerId !== ganttPointerCtx.pointerId) return;
      const task = state.ganttTasks?.[ganttPointerCtx.taskIndex];
      const changed = ganttPointerCtx.changed;
      ganttPointerCtx = null;
      if (task && changed) {
        toast(`任务已更新：${task.name}（${String(task.start).padStart(2, '0')}:00-${String(task.start + task.duration).padStart(2, '0')}:00）`);
      }
    }

    function renderGanttWorkbench() {
      const thead = document.getElementById('gantt-thead');
      const tbody = document.getElementById('gantt-tbody');
      const filter = document.getElementById('gantt-plant-filter')?.value || 'all';
      
      // Render header
      let headerHtml = '<tr><th class="gantt-line-col">产线</th>';
      for (let h = 0; h < GANTT_TOTAL_COLS; h++) {
        headerHtml += `<th style="width:${GANTT_CELL_W}px;">${String(h).padStart(2, '0')}</th>`;
      }
      headerHtml += '</tr>';
      thead.innerHTML = headerHtml;
      
      // Render body
      let bodyHtml = '';
      for (let line = 0; line < GANTT_LINE_TOTAL; line++) {
        const lineName = `ZZW${String(line + 1).padStart(2, '0')}`;
        const hidden = lineMatchesFilter(line, filter) ? '' : ' style="display:none;"';
        bodyHtml += `<tr${hidden}><td class="gantt-line-col">${lineName}</td>`;
        for (let h = 0; h < GANTT_TOTAL_COLS; h++) {
          bodyHtml += `<td></td>`;
        }
        bodyHtml += '</tr>';
      }
      tbody.innerHTML = bodyHtml;
      
      // Render tasks
      const tasks = state.ganttTasks || [];
      tasks.forEach((task, index) => {
        sanitizeTask(task);
        if (!lineMatchesFilter(task.line, filter)) return;
        const row = tbody.rows[task.line];
        if (!row) return;
        const cell = row.cells[task.start + 1];
        if (!cell) return;
        
        const taskDiv = document.createElement('div');
        taskDiv.className = `gantt-task ${task.cls}`;
        taskDiv.style.left = '1px';
        taskDiv.style.width = `${task.duration * GANTT_CELL_W - 2}px`;
        taskDiv.title = `${task.name}: ${task.start}:00 - ${task.start + task.duration}:00`;
        taskDiv.innerHTML = `<span class="gantt-task-label">${task.name}</span><span class="gantt-resize-handle left" data-resize="left"></span><span class="gantt-resize-handle right" data-resize="right"></span>`;
        taskDiv.tabIndex = 0;
        taskDiv.setAttribute('role', 'button');
        taskDiv.setAttribute('aria-label', `${task.name}，开始${task.start}点，结束${task.start + task.duration}点`);
        taskDiv.addEventListener('pointerdown', (e) => startTaskPointerInteraction(e, index));
        taskDiv.addEventListener('dblclick', () => openTaskEditor(index));
        taskDiv.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') openTaskEditor(index);
        });
        cell.appendChild(taskDiv);
      });
    }

    function runSelfHealing() {
      const bar = document.getElementById('heal-progress');
      bar.style.width = '0%';
      let p = 0;
      const timer = setInterval(() => {
        p += 20;
        bar.style.width = `${p}%`;
        if (p >= 100) {
          clearInterval(timer);
          document.getElementById('heal-result').textContent = '秒级局部重排完成：影响范围仅注塑/总装链路，整体计划风险可控';
          toast('自愈重排完成');
        }
      }, 180);
    }

    function executePreplan() {
      document.getElementById('execute-confirm-mask')?.classList.add('show');
    }

    function closeExecuteConfirm(showCancelToast = false) {
      document.getElementById('execute-confirm-mask')?.classList.remove('show');
      if (showCancelToast) toast('已取消执行方案');
    }

    function confirmExecutePreplan() {
      closeExecuteConfirm(false);
      toast('方案已执行：当前预排结果已生效');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderLocks();
      renderWipOrders();
      renderGanttWorkbench();
      buildTaskEditorOptions();
      document.getElementById('task-edit-start')?.addEventListener('change', validateTaskEditor);
      document.getElementById('task-edit-end')?.addEventListener('change', validateTaskEditor);
      document.getElementById('task-edit-save')?.addEventListener('click', saveTaskEditor);
      document.getElementById('task-edit-cancel')?.addEventListener('click', closeTaskEditor);
      document.getElementById('task-edit-close')?.addEventListener('click', closeTaskEditor);
      document.getElementById('task-editor-mask')?.addEventListener('click', (e) => {
        if (e.target.id === 'task-editor-mask') closeTaskEditor();
      });
      document.getElementById('execute-confirm-close')?.addEventListener('click', () => closeExecuteConfirm(true));
      document.getElementById('execute-confirm-cancel')?.addEventListener('click', () => closeExecuteConfirm(true));
      document.getElementById('execute-confirm-ok')?.addEventListener('click', confirmExecutePreplan);
      document.getElementById('execute-confirm-mask')?.addEventListener('click', (e) => {
        if (e.target.id === 'execute-confirm-mask') closeExecuteConfirm(false);
      });
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (document.getElementById('task-editor-mask')?.classList.contains('show')) closeTaskEditor();
        if (document.getElementById('execute-confirm-mask')?.classList.contains('show')) closeExecuteConfirm(false);
      });
      document.getElementById('gantt-plant-filter')?.addEventListener('change', renderGanttWorkbench);
      document.addEventListener('pointermove', onTaskPointerMove);
      document.addEventListener('pointerup', onTaskPointerUp);
      document.addEventListener('pointercancel', onTaskPointerUp);
    });
  </script>
  <script src="aps-optimization.js"></script>
</body>
</html>
